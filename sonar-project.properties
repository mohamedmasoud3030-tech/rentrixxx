sonar.projectKey=mohamedmasoud3030-tech_rentrixxx
sonar.organization=mohamedmasoud3030-tech

# Production app and database sources only.
# Legacy snapshots, sandboxes and generated/build output are intentionally excluded
# so SonarCloud reports the shipped product instead of abandoned prototypes.
sonar.sources=artifacts/rentrix/src,supabase
sonar.tests=artifacts/rentrix/src

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,.agents/**,.migration-backup/**,artifacts/mockup-sandbox/**,artifacts/rentrix-promo/**,artifacts/rentrix/legacy-src/**,legacy-src/**,mockup/**,mockup-sandbox/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,.migration-backup/**,artifacts/mockup-sandbox/**,artifacts/rentrix-promo/**,artifacts/rentrix/legacy-src/**,legacy-src/**,mockup/**,mockup-sandbox/**

# Migration SQL repeats constraint patterns by design. Keep it analyzable for syntax/security,
# but exclude it from copy-paste duplication metrics to avoid false-positive maintenance noise.
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,supabase/migrations/**,supabase/sql/**,.migration-backup/**,artifacts/mockup-sandbox/**,artifacts/rentrix-promo/**,artifacts/rentrix/legacy-src/**,legacy-src/**,mockup/**,mockup-sandbox/**
