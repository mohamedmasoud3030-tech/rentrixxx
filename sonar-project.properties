# Production app and database sources only.
# Legacy snapshots, sandboxes and generated/build output are intentionally excluded
# so SonarCloud reports the shipped product instead of abandoned prototypes.
sonar.sources=artifacts/rentrix/src,supabase
sonar.tests=artifacts/rentrix/src

sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,.agents/**,.migration-backup/**,artifacts/mockup-sandbox/**,artifacts/rentrix-promo/**,artifacts/rentrix/legacy-src/**,legacy-src/**,mockup/**,mockup-sandbox/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/supabase/migrations_archived_pre_baseline_20260520/**

sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,.migration-backup/**,artifacts/mockup-sandbox/**,artifacts/rentrix-promo/**,artifacts/rentrix/legacy-src/**,legacy-src/**,mockup/**,mockup-sandbox/**

# SQL migrations remain analyzable, but we exclude generated/replay-only files from copy-paste duplication.
# This keeps the real baseline migration visible to review while avoiding false-positive duplication noise.
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/supabase/migrations_archived_pre_baseline_20260520/**/*.sql,**/supabase/migrations/**/*_remote_history_placeholder.sql,**/supabase/migrations/*_remote_history_placeholder.sql,supabase/sql/**,.migration-backup/**,artifacts/mockup-sandbox/**,artifacts/rentrix-promo/**,artifacts/rentrix/legacy-src/**,legacy-src/**,mockup/**,mockup-sandbox/**
