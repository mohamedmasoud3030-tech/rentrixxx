name: supabase-control-plane-ci

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

jobs:
  validate-and-migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: nnggcnpcuomwfuupupwg
    steps:
      # Final cloud-only execution order:
      # Type Check -> Supabase Cloud Validate -> Supabase Auto Fix -> Schema Audit (fail-fast) -> Schema Self-Heal (safe mode)
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run type-check

      - name: Supabase Cloud Validate
        run: node scripts/supabase-validate.mjs

      - name: Supabase Auto Fix
        run: node scripts/supabase-autofix.mjs

      - name: Schema Audit
        run: node scripts/schema-audit.mjs

      - name: Schema Self-Heal
        run: node scripts/schema-self-heal.mjs
