name: supabase-control-plane-ci

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches: ["main", "master"]

jobs:
  validate-and-migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # ============================================
    # SUPABASE CLOUD SELF-HEALING PIPELINE (FINAL)
    # ============================================
    #
    # EXECUTION FLOW:
    # 1. Type Check
    # 2. Cloud Validate (API-based schema validation)
    # 3. Auto Fix (safe idempotent repairs)
    # 4. Schema Audit (FAIL-FAST protection gate)
    # 5. Schema Self-Heal (safe non-destructive repair layer)
    #
    # RULES:
    # - NO Supabase CLI usage
    # - NO local DB dependency
    # - NO Docker dependency
    # - ALL operations are cloud API driven
    # - FAIL-FAST enabled on schema drift detection
    # - SELF-HEAL only allows non-destructive fixes
    #
    # ============================================
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: nnggcnpcuomwfuupupwg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run type-check

      - name: Supabase Cloud Validate
        run: node scripts/supabase-validate.mjs

      - name: Supabase Auto Fix
        run: node scripts/supabase-autofix.mjs

      - name: Schema Audit (FAIL-FAST)
        run: node scripts/schema-audit.mjs

      - name: Schema Self-Heal (SAFE MODE)
        run: node scripts/schema-self-heal.mjs
