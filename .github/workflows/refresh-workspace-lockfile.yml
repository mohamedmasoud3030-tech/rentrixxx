name: Refresh workspace lockfile

on:
  push:
    branches: [fix-pdf-printing]
    paths:
      - pnpm-workspace.yaml

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Commit regenerated lockfile
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            exit 0
          fi
          git config user.name "Rentrix Bot"
          git config user.email "bot@rentrix.app"
          git add pnpm-lock.yaml
          git commit -m "chore: refresh workspace lockfile"
          git push
