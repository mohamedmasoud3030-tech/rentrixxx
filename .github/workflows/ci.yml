name: CI / Typecheck, Lint & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm supabase:migration-evidence
      - name: Run typecheck
        id: typecheck
        shell: bash
        run: |
          set +e
          pnpm typecheck > /tmp/rentrix-typecheck.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 200 /tmp/rentrix-typecheck.log
          exit 0
      - name: Upload typecheck diagnostics
        if: steps.typecheck.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: rentrix-typecheck-diagnostics
          path: /tmp/rentrix-typecheck.log
      - name: Fail on typecheck errors
        if: steps.typecheck.outputs.status != '0'
        run: exit 1
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm --filter ./rentrix-app run typecheck:test
      - run: pnpm --filter ./rentrix-app test
      - name: Run financial tests
        id: financial-tests
        shell: bash
        run: |
          set +e
          pnpm --filter ./rentrix-app run test:financials > /tmp/rentrix-financial-tests.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          tail -n 160 /tmp/rentrix-financial-tests.log
          exit 0
      - name: Upload financial test diagnostics
        if: steps.financial-tests.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: rentrix-financial-test-diagnostics
          path: /tmp/rentrix-financial-tests.log
      - name: Fail on financial test errors
        if: steps.financial-tests.outputs.status != '0'
        run: exit 1
