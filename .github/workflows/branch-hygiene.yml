name: Branch Hygiene

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate-commits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        run: bash .github/scripts/validate-commit-messages.sh "origin/main"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install --legacy-peer-deps

      - run: npm run typecheck
