      /* @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap'); */
      
      /* 
        ==============================================
        RENTRIX DESIGN SYSTEM - PHASE 3A
        ==============================================
        - Light Theme (default)
        - Dark Theme ([data-theme="dark"])
      */
      :root {
        --radius: 0.5rem;

        /* Light Theme Colors */
        --color-primary: 220 40% 50%;
        --color-primary-fg: 220 40% 98%;
        
        --color-bg: 220 20% 98%;        /* Off-white */
        --color-card: 0 0% 100%;         /* Pure white */
        --color-border: 220 15% 90%;
        
        --color-text-primary: 220 15% 20%;  /* Dark Gray */
        --color-text-muted: 220 10% 45%;

        --color-sidebar-bg: 220 18% 96%;
        --color-sidebar-text: 220 10% 40%;
        --color-sidebar-active-bg: hsl(var(--color-primary) / 0.1);
        --color-sidebar-hover-bg: 220 15% 92%;
        --color-sidebar-active-text: hsl(var(--color-primary));

        --color-success-bg: hsl(145 63% 95%);
        --color-success-text: hsl(145 63% 30%);
        --color-warning-bg: hsl(45 100% 95%);
        --color-warning-text: hsl(45 100% 30%);
        --color-danger-bg: hsl(0 70% 95%);
        --color-danger-text: hsl(0 70% 45%);
        --color-info-bg: hsl(200 80% 95%);
        --color-info-text: hsl(200 80% 45%);
        --color-default-bg: hsl(220 15% 92%);
        --color-default-text: hsl(220 15% 40%);
      }

      [data-theme="dark"] {
        /* Dark Theme Colors */
        --color-primary: 220 40% 60%;
        --color-primary-fg: 220 40% 10%;

        --color-bg: 220 18% 10%;         /* True dark gray */
        --color-card: 220 18% 14%;       /* Slightly lighter card */
        --color-border: 220 15% 25%;
        
        --color-text-primary: 220 20% 95%; /* Light gray */
        --color-text-muted: 220 15% 60%;

        --color-sidebar-bg: 220 18% 8%;
        --color-sidebar-text: 220 15% 65%;
        --color-sidebar-active-bg: hsl(var(--color-primary) / 0.1);
        --color-sidebar-hover-bg: 220 15% 20%;
        --color-sidebar-active-text: hsl(var(--color-primary));

        --color-success-bg: hsl(145 63% 30% / 0.2);
        --color-success-text: hsl(145 63% 70%);
        --color-warning-bg: hsl(45 100% 40% / 0.2);
        --color-warning-text: hsl(45 100% 70%);
        --color-danger-bg: hsl(0 70% 45% / 0.2);
        --color-danger-text: hsl(0 70% 75%);
        --color-info-bg: hsl(200 80% 45% / 0.2);
        --color-info-text: hsl(200 80% 75%);
        --color-default-bg: hsl(220 15% 25% / 0.5);
        --color-default-text: hsl(220 15% 75%);
      }


      /* Base Styles */
      html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      body {
        font-family: 'Cairo', sans-serif;
        background-color: hsl(var(--color-bg));
        color: hsl(var(--color-text-primary));
      }
    </style>
    <script>
      // Apply theme on initial load
      (function() {
        // Corrected to check for appearance settings and theme
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
