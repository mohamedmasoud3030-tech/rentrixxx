    <style>
      /*
        ==============================================
        RENTRIX DESIGN SYSTEM — LUXURY THEME
        Morning (Light): Warm Ivory + Golden
        Night (Dark): Deep Navy + Golden accents
        ==============================================
      */
      :root {
        --radius: 0.625rem;

        /* === MORNING LIGHT THEME === */
        /* Gold accent: #B8860B / hsl(43 82% 38%) */
        --color-primary: 43 82% 38%;
        --color-primary-fg: 43 82% 98%;

        /* Warm ivory background */
        --color-bg: 38 40% 96%;
        --color-card: 0 0% 100%;
        --color-border: 38 25% 88%;

        /* Text */
        --color-text-primary: 30 20% 18%;
        --color-text-muted: 30 12% 48%;

        /* Sidebar warm cream */
        --color-sidebar-bg: 38 30% 97%;
        --color-sidebar-text: 30 15% 42%;
        --color-sidebar-active-bg: 43 82% 38%;
        --color-sidebar-hover-bg: 38 25% 92%;
        --color-sidebar-active-text: 0 0% 100%;

        /* Status Colors */
        --color-success-bg: hsl(145 55% 93%);
        --color-success-text: hsl(145 55% 28%);
        --color-warning-bg: hsl(40 90% 93%);
        --color-warning-text: hsl(40 90% 28%);
        --color-danger-bg: hsl(0 65% 93%);
        --color-danger-text: hsl(0 65% 42%);
        --color-info-bg: hsl(210 70% 93%);
        --color-info-text: hsl(210 70% 38%);
        --color-default-bg: hsl(38 20% 90%);
        --color-default-text: hsl(38 15% 40%);

        /* Shadows */
        --shadow-card: 0 2px 12px -2px rgba(184, 134, 11, 0.1), 0 1px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-card-hover: 0 8px 24px -4px rgba(184, 134, 11, 0.18), 0 2px 8px -2px rgba(0, 0, 0, 0.08);
        --shadow-sidebar: 2px 0 16px -4px rgba(184, 134, 11, 0.12);
      }

      [data-theme="dark"] {
        /* === NIGHT DARK THEME === */
        --color-primary: 43 78% 52%;
        --color-primary-fg: 220 30% 8%;

        /* Deep navy */
        --color-bg: 216 28% 7%;
        --color-card: 216 25% 10%;
        --color-border: 216 18% 18%;

        /* Text */
        --color-text-primary: 210 25% 92%;
        --color-text-muted: 210 15% 58%;

        /* Dark sidebar deep navy */
        --color-sidebar-bg: 218 32% 8%;
        --color-sidebar-text: 210 18% 62%;
        --color-sidebar-active-bg: 43 78% 52%;
        --color-sidebar-hover-bg: 216 22% 15%;
        --color-sidebar-active-text: 220 30% 8%;

        /* Status Colors */
        --color-success-bg: hsl(145 45% 15% / 0.6);
        --color-success-text: hsl(145 55% 65%);
        --color-warning-bg: hsl(40 80% 20% / 0.6);
        --color-warning-text: hsl(40 80% 68%);
        --color-danger-bg: hsl(0 55% 20% / 0.6);
        --color-danger-text: hsl(0 65% 72%);
        --color-info-bg: hsl(210 60% 18% / 0.6);
        --color-info-text: hsl(210 70% 72%);
        --color-default-bg: hsl(216 20% 18% / 0.7);
        --color-default-text: hsl(216 15% 72%);

        /* Shadows */
        --shadow-card: 0 2px 12px -2px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(184, 134, 11, 0.06);
        --shadow-card-hover: 0 8px 24px -4px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(184, 134, 11, 0.18);
        --shadow-sidebar: 2px 0 20px -4px rgba(0, 0, 0, 0.5);
      }

      /* === BASE STYLES === */
      html {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        scroll-behavior: smooth;
      }

      body {
        font-family: 'Cairo', sans-serif;
        background-color: hsl(var(--color-bg));
        color: hsl(var(--color-text-primary));
        line-height: 1.6;
      }

      * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease; }
      *, *::before, *::after { box-sizing: border-box; }
    </style>
