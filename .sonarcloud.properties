sonar.projectKey=mohamedmasoud3030-tech_rentrixxx
sonar.organization=mohamedmasoud3030-tech

sonar.sources=artifacts/rentrix/src
sonar.exclusions=**/*.test.ts,**/*.spec.ts,**/node_modules/**,dist/**,build/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.test.ts,**/*.spec.ts,**/node_modules/**

# Security settings
sonar.security.hotspots.review.status.dismissed=FALSE

# Code duplication
sonar.cpd.exclusions=**/*.test.ts,**/*.spec.ts

# Reliability
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=*
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.test.ts
