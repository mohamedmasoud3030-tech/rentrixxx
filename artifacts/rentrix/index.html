<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rentrix — نظام إدارة العقارات الذكي</title>
    <meta name="description" content="Rentrix نظام إدارة العقارات الذكي — إدارة شاملة للعقود والمستأجرين والمالية والتقارير." />
    <meta name="robots" content="index, follow" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" />

    <!-- Favicon & Icons -->
    <link rel="icon" href="/icon-rentrix.png" type="image/png" />
    <link rel="shortcut icon" href="/icon-rentrix.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icon-rentrix.png" />

    <!-- PWA -->
    <!-- Manifest is disabled on protected preview deployments where Vercel auth
         blocks anonymous manifest requests and spams 401 console errors. -->
    <!-- <link rel="manifest" href="/manifest.json" /> -->
    <meta name="theme-color" content="#B8860B" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rentrix" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rentrix — نظام إدارة العقارات الذكي" />
    <meta property="og:description" content="نظام إدارة العقارات الذكي للشركات والمكاتب العقارية" />
    <meta property="og:locale" content="ar_AR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Rentrix — نظام إدارة العقارات الذكي" />
    <meta name="twitter:description" content="نظام إدارة العقارات الذكي للشركات والمكاتب العقارية" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Rentrix",
      "description": "نظام إدارة العقارات الذكي للشركات والمكاتب العقارية",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "inLanguage": "ar"
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
      :root {
        --color-bg: 224 20% 97%;
        --color-card: 0 0% 100%;
        --color-border: 220 15% 90%;
        --color-text-primary: 222 35% 12%;
        --color-text-muted: 220 15% 52%;
        --color-primary: 214 85% 42%;
        --color-primary-fg: 0 0% 100%;
        --color-accent: 38 95% 52%;
        --color-sidebar-bg: 222 30% 14%;
        --color-sidebar-text: 220 20% 68%;
        --color-sidebar-active-bg: 214 85% 42%;
        --color-sidebar-active-text: 0 0% 100%;
        --color-sidebar-hover-bg: 222 25% 20%;
        --radius: 0.75rem;
        --shadow-card: 0 14px 35px -24px rgba(15, 23, 42, 0.32), 0 2px 10px -8px rgba(15, 23, 42, 0.18);
        --shadow-card-hover: 0 20px 45px -26px rgba(15, 23, 42, 0.42), 0 8px 18px -14px rgba(37, 99, 235, 0.28);
        --shadow-sidebar: -10px 0 34px -28px rgba(15, 23, 42, 0.75);
      }

      [data-theme="dark"] {
        --color-bg: 222 32% 8%;
        --color-card: 222 28% 11%;
        --color-border: 222 20% 18%;
        --color-text-primary: 210 30% 94%;
        --color-text-muted: 220 15% 55%;
        --color-primary: 214 80% 56%;
        --color-primary-fg: 222 32% 8%;
        --color-accent: 38 95% 58%;
        --color-sidebar-bg: 222 38% 6%;
        --color-sidebar-text: 220 18% 60%;
        --color-sidebar-active-bg: 214 80% 56%;
        --color-sidebar-active-text: 222 32% 8%;
        --color-sidebar-hover-bg: 222 30% 13%;
      }

      html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; scroll-behavior: smooth; }
      body { font-family: 'Cairo', 'Noto Sans Arabic', 'Tajawal', sans-serif; background-color: hsl(var(--color-bg)); color: hsl(var(--color-text-primary)); line-height: 1.6; }
      * { transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease; }
      *, *::before, *::after { box-sizing: border-box; }
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
      button, a, nav { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
      .overflow-y-auto, .overflow-x-auto { -webkit-overflow-scrolling: touch; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .active\:scale-95:active { transform: scale(0.95); }
    </style>

    <!-- Theme init (before render to avoid flash) -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
