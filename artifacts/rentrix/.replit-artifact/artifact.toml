kind = "web"
previewPath = "/"
title = "Rentrix Property Management"
version = "1.0.0"
id = "artifacts/rentrix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19004

[services.development]
run = "pnpm --filter @workspace/rentrix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rentrix", "run", "build" ]
publicDir = "artifacts/rentrix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19004"
BASE_PATH = "/"
