kind = "slides"
previewPath = "/rentrix-pitch/"
title = "Rentrix Pitch Deck"
version = "1.0.0"
id = "artifacts/rentrix-pitch"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/rentrix-pitch/" ]
localPort = 23827

[services.development]
run = "pnpm --filter @workspace/rentrix-pitch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rentrix-pitch", "run", "build" ]
publicDir = "artifacts/rentrix-pitch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23827"
BASE_PATH = "/rentrix-pitch/"
